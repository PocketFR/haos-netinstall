name: Build ISO

on:
  workflow_dispatch:          # build manuel
  push:
    tags: ['v*']              # un tag v1.0.0 -> build + release
  pull_request:
    paths: ['build-iso.sh', 'haos-installer.sh']

# Le conteneur Debian execute les 'run' avec sh (dash) par defaut, qui ignore
# les bashismes (ex: ${VAR//x/y}). On force bash partout.
defaults:
  run:
    shell: bash

jobs:
  build:
    # Les runners GitHub n'existent qu'en Ubuntu/Windows/macOS : pas de Debian.
    # On build donc DANS un conteneur Debian (meme live-build et meme debootstrap
    # que l'environnement de dev), sur un hote Ubuntu.
    # --privileged est requis : live-build a besoin des loop devices et de chroot.
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    permissions:
      contents: write          # requis pour créer la release sur tag
    steps:
      - uses: actions/checkout@v4

      - name: Vérification syntaxe
        run: |
          bash -n build-iso.sh
          bash -n haos-installer.sh
          apt-get update && apt-get install -y shellcheck
          shellcheck -S warning build-iso.sh haos-installer.sh || true

      - name: Installer live-build
        run: |
          apt-get install -y live-build debootstrap fdisk sudo libarchive-tools xorriso
          apt-get install -y p7zip-full || true   # absent de certaines versions Debian
          lb --version
          echo "--- debootstrap connait-il la cible ? ---"
          ls /usr/share/debootstrap/scripts/ | grep -E 'trixie|bookworm' || true

      - name: Construire l'ISO
        run: |
          chmod +x build-iso.sh haos-installer.sh
          bash ./build-iso.sh

      - name: Vérifier la conformité UEFI de l'ISO
        run: |
          set -x
          ISO=$(ls haos-installer-iso/live-image-*.iso | head -1)

          # 1) Partition EFI presente dans la table
          fdisk -l "$ISO" | grep -i 'EFI' \
            || { echo "ERREUR: pas de partition EFI dans l'ISO"; exit 1; }

          # 2) Chargeur de repli present. On liste l'ISO9660 avec plusieurs outils :
          #    un outil manquant ne doit PAS etre confondu avec un fichier absent.
          LIST=""
          for tool in "bsdtar -tf" "7z l" "xorriso -indev"; do
            bin=${tool%% *}
            command -v "$bin" >/dev/null || continue
            case "$bin" in
              xorriso) out=$(xorriso -indev "$ISO" -find / 2>/dev/null) ;;
              *)       out=$($tool "$ISO" 2>/dev/null) ;;
            esac
            [ -n "$out" ] && { LIST="$out"; echo "--- liste obtenue via $bin ---"; break; }
          done

          if [ -z "$LIST" ]; then
            echo "ERREUR: aucun outil n'a pu lister l'ISO (bsdtar/7z/xorriso)"; exit 1
          fi

          echo "$LIST" | grep -i 'efi' || true
          echo "$LIST" | grep -qi 'bootx64.efi' \
            || { echo "ERREUR: /EFI/boot/bootx64.efi introuvable dans l'ISO"; exit 1; }
          echo "OK: ISO UEFI-conforme (ESP + bootx64.efi)"

      - name: Renommer et calculer le SHA256
        id: iso
        run: |
          ISO=$(ls haos-installer-iso/live-image-*.iso | head -1)
          REF=$(echo "${GITHUB_REF_NAME:-manual}" | tr '/' '-')
          NAME="haos-netinstall-${REF}-amd64.iso"
          mv "$ISO" "$NAME"
          sha256sum "$NAME" > "$NAME.sha256"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "### $NAME" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -h "$NAME" >> "$GITHUB_STEP_SUMMARY"
          cat "$NAME.sha256" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Publier en artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.name }}
          path: |
            ${{ steps.iso.outputs.name }}
            ${{ steps.iso.outputs.name }}.sha256
          retention-days: 14

      - name: Publier la release (sur tag uniquement)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.iso.outputs.name }}
            ${{ steps.iso.outputs.name }}.sha256
          body: |
            ISO d'installation Home Assistant OS (bare-metal) — build automatique.

            **Livré tel quel, sans garantie ni support.** Cet outil efface
            intégralement le disque sélectionné. Voir le README et la LICENSE.

            Projet non officiel, sans affiliation avec l'Open Home Foundation
            ni Nabu Casa.

            Vérifiez l'intégrité avec le fichier `.sha256` joint.
